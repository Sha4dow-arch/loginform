<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="g.css">
    <title>Facebook Clone</title>
</head>
<body>
    <form>
        <h5>Login Into Facebook</h5>
        <img src="image/less-than.png" alt="less than symbol" class="less-than">
        <input type="text" placeholder="Email or Mobile Number"><br><br>
        <input type="password" placeholder="Password"><br><br>
        <button type="submit">Log In</button>
        <h4><a href="#">Forgot Password?</a></h4><br>
        <button type="submit" class="btn" >Create New Account</button><br>
        <img src="image/meta.jpg" alt="Meta Logo" aria-placeholder="meta" class="meta">
    </form>
</body>
</html>
