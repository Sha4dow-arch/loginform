<!-- document type declaration for HTML5 -->
<!DOCTYPE html>
<!-- root HTML element with language attribute -->
<html lang="en">
<head>
    <!-- character encoding for the page -->
    <meta charset="UTF-8">
    <!-- responsive viewport setting for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- link to external stylesheet -->
    <link rel="stylesheet" href="g.css">
    <!-- page title shown in browser tab -->
    <title>Facebook Clone</title>
</head>
<body>
    <!-- main wrapper for centering the content -->
    <div class="wrapper">
        <!-- login form card container -->
        <form class="card">
            <!-- heading with icon and title text -->
            <h5><img src="image/less-than.png" alt="less than symbol" class="less-than">Login Into Facebook</h5>
            <!-- email or phone input field -->
            <input type="text" placeholder="Email or Mobile Number">
            <!-- password input field -->
            <input type="password" placeholder="Password">
            <!-- primary login button -->
            <button type="submit">Log In</button>
            <!-- forgot password link -->
            <h4><a href="#">Forgot Password?</a></h4>
            <!-- secondary action button for account creation -->
            <button type="submit" class="btn">Create New Account</button>
            <!-- footer branding text with icon -->
            <h6><img src="image/meta.jpg" alt="Meta" class="btn-blank">Meta</h6>
        </form>
    </div>
</body>
</html>
