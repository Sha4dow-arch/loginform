<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="g.css">
    <title>Facebook Clone</title>
</head>
<body>
    <div class="wrapper">
        <form class="card">
            <h5><img src="image/less-than.png" alt="less than symbol" class="less-than">Login Into Facebook</h5>
            <input type="text" placeholder="Email or Mobile Number">
            <input type="password" placeholder="Password">
            <button type="submit">Log In</button>
            <h4><a href="#">Forgot Password?</a></h4>
            <button type="submit" class="btn">Create New Account</button>
            <h6><img src="image/meta.jpg" alt="Meta" class="btn-blank">Meta</h6>
        </form>
    </div>
</body>
</html>
